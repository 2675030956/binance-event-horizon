    .grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}

    .heroMetricMini .m{margin-top:5px;font-size:12px;color:var(--muted);line-height:1.5}

    const r=()=>state.report||{},text=(v,f="-")=>{const s=String(v??"").trim();return s||f;},num=(v,d=1)=>{const n=Number(v||0);return Number.isFinite(n)?n.toFixed(d):"-";},pct=(v)=>{const n=Number(v||0);return Number.isFinite(n)?`${n>=0?"+":""}${n.toFixed(2)}%`:"-";},money=(v)=>{const n=Number(v||0);if(!Number.isFinite(n))return "-";if(Math.abs(n)>=1e9)return `$${(n/1e9).toFixed(2)}B`;if(Math.abs(n)>=1e6)return `$${(n/1e6).toFixed(2)}M`;if(Math.abs(n)>=1e3)return `$${(n/1e3).toFixed(2)}K`;return `$${n.toFixed(2)}`;},esc=(v)=>text(v).replace(/[&<>"]/g,(c)=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])),timeText=(v)=>{if(!v)return "--";const d=new Date(v);return Number.isNaN(d.getTime())?"--":d.toLocaleString("zh-CN",{hour12:false});},micro=(v)=>`<span class="micro">${esc(v)}</span>`,bar=(s)=>`<div class="bar"><div class="rail"><span style="width:${Math.max(0,Math.min(100,Number(s||0)))}%"></span></div><strong>${num(s)}</strong></div>`;

    function orbitNodes(items){const rs=[150,210,246,182,230,136];return items.slice(0,6).map((it,i)=>{const a=(360/Math.max(items.length,1))*i-70,rad=rs[i%rs.length];return `<div class="node" style="left:50%;top:50%;transform:translate(-50%,-50%) rotate(${a}deg) translate(${rad}px) rotate(-${a}deg)"><div class="bubble"><div class="sym">${esc(it.symbol)}</div><div class="meta">${esc(it.priority||"-")} · ${num(it.opportunity_score)}</div></div></div>`}).join("")}

      watch:"基于综合机会评分输出当前优先跟踪资产池，便于盘中观察、内容决策与后续分析。",
      focus:"对单一资产进行聚合式拆解，展示当前驱动、关键条件与官方关联信息。",
      broadcast:"将同一份分析结果整理为可直接发布的内容草稿，适配 X、广场与直播场景。"
    };
    const padItems=(items,count)=>Array.from({length:count},(_,i)=>items[i]||null);
    const symbolList=(items,count=4)=>(items||[]).slice(0,count).map(x=>text(x.symbol)).filter(Boolean).join("、")||"暂无";
    function satCard(item){
      if(!item)return `<div class="satCard"><div class="sym">待补位</div><div class="meta">观察席位</div><div class="desc">当前席位暂无新增标的，下一轮更新后自动补充。</div></div>`;
      const trend=Number(item.change_pct||0)>=0?"上涨":"回撤";
      return `<div class="satCard"><div class="sym">${esc(item.symbol)}</div><div class="meta">${esc(item.orbit_type||"-")} · ${esc(item.priority||"-")}</div><div class="desc">${esc(item.thesis||"当前多源信号对该资产形成联合支撑。")}</div><div class="tags"><span>机会 ${num(item.opportunity_score)}</span><span>${trend} ${pct(item.change_pct)}</span></div></div>`;
    }
    function miniMetric(item){
      if(!item)return `<div class="heroMetricMini"><div class="k">观察席位</div><div class="v">--</div><div class="m">等待后续数据补充。</div></div>`;
      return `<div class="heroMetricMini"><div class="k">${esc(item.symbol)}</div><div class="v">${num(item.opportunity_score)}</div><div class="m">${esc(item.orbit_type||"-")} · ${pct(item.change_pct)}</div></div>`;
    }
    renderScene=function(){
      const scenes=document.querySelectorAll(".scene"),target=document.getElementById(`scene-${state.scene}`),renderer=({overview:renderOverview,constellation:renderConstellation,scenarios:renderScenarios,catalysts:renderCatalysts,gravity:renderGravity,watchlist:renderWatch,focus:renderFocus,broadcast:renderBroadcast}[state.scene]||renderOverview);
      scenes.forEach(n=>n.classList.remove("active"));
      renderer();
      if(target)target.scrollTop=0;
      requestAnimationFrame(()=>target?.classList.add("active"));
    };
    let refreshTask=null;
    refreshData=async function(force=false){
      if(!DATA_URL)return false;
      if(refreshTask)return refreshTask;
      refreshTask=(async()=>{try{const res=await fetch(`${DATA_URL}?t=${Date.now()}`,{cache:"no-store"});if(!res.ok)throw new Error(`HTTP ${res.status}`);state.report=await res.json();renderAll();return true}catch(err){if(force)console.warn("refresh failed",err);return false}finally{refreshTask=null}})();
      return refreshTask;
    };
    document.addEventListener("click",async(e)=>{
      const sceneBtn=e.target.closest("[data-scene]");
      if(sceneBtn){
        e.preventDefault();
        e.stopImmediatePropagation();
        state.scene=sceneBtn.getAttribute("data-scene");
        renderDock();
        renderScene();
        return;
      }
      const refreshBtn=e.target.closest("#refreshBtn");
      if(refreshBtn){
        e.preventDefault();
        e.stopImmediatePropagation();
        const originalText=refreshBtn.textContent;
        refreshBtn.disabled=true;
        refreshBtn.textContent="刷新中...";
        try{await refreshData(true)}finally{refreshBtn.disabled=false;refreshBtn.textContent=originalText}
        return;
      }
      const copyBtn=e.target.closest("[data-copy]");
      if(copyBtn){
        e.preventDefault();
        e.stopImmediatePropagation();
        await copyFrom(copyBtn.getAttribute("data-copy"));
      }
    },true);
    function normalizeLayout(){
      const topbar=document.querySelector(".topbar");
      const brand=topbar?.querySelector(".brand");
      const status=document.getElementById("statusStrip");
      const actions=topbar?.querySelector(".actions");
      const refreshBtn=document.getElementById("refreshBtn");
      const dock=document.getElementById("dock");
      if(!topbar||!brand||!status||!refreshBtn||!dock)return;
      let headerRow=topbar.querySelector(".headerRow");
      if(!headerRow){
        headerRow=document.createElement("div");
        headerRow.className="headerRow";
        topbar.prepend(headerRow);
      }
      let headerAside=topbar.querySelector(".headerAside");
      if(!headerAside){
        headerAside=document.createElement("div");
        headerAside.className="headerAside";
      }
      let toolbar=topbar.querySelector(".toolbar");
      if(!toolbar){
        toolbar=document.createElement("div");
        toolbar.className="toolbar";
      }
      if(brand.parentElement!==headerRow)headerRow.appendChild(brand);
      if(refreshBtn.parentElement!==headerAside)headerAside.appendChild(refreshBtn);
      if(headerAside.parentElement!==headerRow)headerRow.appendChild(headerAside);
      if(status.parentElement!==toolbar)toolbar.appendChild(status);
      if(dock.parentElement!==toolbar)toolbar.appendChild(dock);
      if(toolbar.parentElement!==topbar)topbar.appendChild(toolbar);
      actions?.remove();
      document.querySelector("footer.foot")?.remove();
    }
    renderStatus=function(){
      const p=r().market_phase||{},t=p.top_asset||{};
      document.getElementById("statusStrip").innerHTML=[
        ["市场相位",text(p.phase_name),"当前主导阶段"],
        ["信号密度",num(p.signal_density),"多源信号强度"],
        ["杠杆温度",num(p.leverage_temperature),`关注 ${text(t.symbol)}`],
        ["催化压力",num(p.catalyst_pressure),`风险 ${num(p.gravity_pressure)}`]
      ].map(i=>`<div class="pill"><div class="k">${esc(i[0])}</div><div class="v">${esc(i[1])}</div><div class="m">${esc(i[2])}</div></div>`).join("");
      document.getElementById("phaseSummary").textContent=SYSTEM_SUMMARY;
    };
    renderOverview=function(){
      const p=r().market_phase||{},t=r().temporal_shift||{},w=r().orbit_watchlist||[],b=r().live_brief||[];
      const leftRail=padItems(w.slice(0,2),2).map(satCard).join("");
      const rightRail=padItems(w.slice(2,4),2).map(satCard).join("");
      const ribbon=padItems(w.slice(4,7),3).map(miniMetric).join("");
      const top=p.top_asset||w[0]||{};
      const arrivals=symbolList(t.new_arrivals,4);
      const accelerating=symbolList(t.accelerating_assets,4);
      const fading=symbolList(t.fading_assets,4);
      const briefs=(b.length?b.slice(0,4):["当前暂无新增摘要，系统将在下一轮数据更新后自动补充。"]).map(x=>`<div class="pill" style="border-radius:18px;padding:12px 14px">${esc(x)}</div>`).join("");
      document.getElementById("scene-overview").innerHTML=`<div class="stack"><div class="grid2"><div class="panel heroCompact"><div class="heroCompactHead"><div><div class="kicker">系统总览</div><h2>${esc(p.phase_name||"-")}</h2><p>${esc(p.phase_transition_hint||"系统正在根据最新信号重估当前市场阶段。")}</p></div><div class="brief">${micro(`核心资产 ${text(top.symbol)}`)}${micro(`信号密度 ${num(p.signal_density)}`)}${micro(`催化压力 ${num(p.catalyst_pressure)}`)}</div></div><div class="heroBoard"><div class="heroRail">${leftRail}</div><div class="heroCenter"><div class="heroGlow"></div><div class="phaseCore"><div class="small">当前阶段</div><div class="big">${esc(p.phase_name||"-")}</div><div class="sub">${esc(p.phase_summary||"暂无阶段说明")}</div><div class="topAsset"><div class="small">核心跟踪资产</div><strong>${esc(top.symbol||"-")}</strong><span>${esc(text(top.display_name||top.symbol,"暂无核心资产"))}</span></div><div class="tags" style="justify-content:center"><span>杠杆温度 ${num(p.leverage_temperature)}</span><span>风险压力 ${num(p.gravity_pressure)}</span></div></div></div><div class="heroRail">${rightRail}</div></div><div class="phaseRibbon">${ribbon}</div></div><div class="stack"><div class="panel"><h2>阶段矩阵</h2><p>汇总当前阶段、信号密度、杠杆温度与风险压力，用于快速判断市场所处环境。</p><div class="phase" style="margin-top:14px"><div class="phaseCard"><div class="k">信号密度</div><div class="v">${num(p.signal_density)}</div></div><div class="phaseCard"><div class="k">杠杆温度</div><div class="v">${num(p.leverage_temperature)}</div></div><div class="phaseCard"><div class="k">催化压力</div><div class="v">${num(p.catalyst_pressure)}</div></div><div class="phaseCard"><div class="k">风险压力</div><div class="v">${num(p.gravity_pressure)}</div></div></div></div><div class="panel"><h3>动态摘要</h3><div class="brief" style="margin-top:12px">${briefs}</div></div><div class="panel"><h3>跟踪变化</h3><div class="brief" style="margin-top:12px"><div class="pill" style="border-radius:18px;padding:12px 14px">阶段变化：${esc(t.phase_transition_hint||"暂无")}</div><div class="pill" style="border-radius:18px;padding:12px 14px">新增纳入：${esc(arrivals)}</div><div class="pill" style="border-radius:18px;padding:12px 14px">强度上修：${esc(accelerating)}</div><div class="pill" style="border-radius:18px;padding:12px 14px">观察降级：${esc(fading)}</div></div></div></div></div></div>`;
    };
    renderConstellation=function(){
      const lanes=r().signal_constellation||[];
      document.getElementById("scene-constellation").innerHTML=`<div class="stack">${panel("信号星图",PRODUCT_COPY.constellation)}<div class="laneGrid">${lanes.map(l=>`<div class="panel"><div class="top"><div><h3>${esc(l.title)}</h3><div class="subline">强度 ${num(l.intensity)} · 覆盖 ${text(l.count)} 项</div></div>${micro("信号层")}</div>${bar(l.intensity)}<p>${esc(l.summary)}</p><div class="tags">${(l.assets||[]).map(a=>`<span>${esc(a.symbol)} · ${num(a.score)}</span>`).join("")}</div></div>`).join("")}</div></div>`;
    };
    renderScenarios=function(){
      const s=r().scenario_engine||[];
      document.getElementById("scene-scenarios").innerHTML=`<div class="stack">${panel("场景引擎",PRODUCT_COPY.scenarios)}<div class="scenarioGrid"><div class="stack">${s.map(i=>`<div class="panel"><div class="top"><div><h3>${esc(i.title)}</h3><div class="subline">${esc(i.archetype)} · ${esc(i.horizon)}</div></div>${micro(i.primary_asset||"-")}</div>${bar(i.probability)}<p>触发条件：${esc(i.trigger)}</p><p>失效条件：${esc(i.invalidation)}</p><p>研判依据：${esc(i.rationale)}</p></div>`).join("")}</div><div class="stack">${s.map(i=>`<div class="panel"><h3>${num(i.probability)}%</h3><p>${esc(i.title)}</p><p>核心观察资产：${esc(i.primary_asset||"-")}</p></div>`).join("")}</div></div></div>`;
    };
    renderCatalysts=function(){
      const cs=r().catalyst_reactor||[];
      document.getElementById("scene-catalysts").innerHTML=`<div class="stack">${panel("催化反应堆",PRODUCT_COPY.catalysts)}<div class="timeline">${cs.map(i=>`<div class="timeItem"><div class="top"><div><h3>${esc(i.title)}</h3><div class="subline">${esc(i.lane||"官方催化")}</div></div>${micro(`影响 ${num(i.impact_score)}`)}</div><p>${esc(i.summary||"该事件已进入催化跟踪列表。")}</p><div class="tags">${(i.linked_assets||[]).length?(i.linked_assets||[]).map(a=>`<span>${esc(a)}</span>`).join(""):`<span>暂无直接映射资产</span>`}</div></div>`).join("")}</div></div>`;
    };
    renderGravity=function(){
      const a=r().gravity_alerts||[],top=a[0]||{};
      document.getElementById("scene-gravity").innerHTML=`<div class="stack"><div class="gravityGrid"><div class="panel well"><div class="disc"><div><div class="small">风险优先级</div><div class="big">${num(top.gravity_score||0)}</div><div class="meta">${esc(top.symbol?`${top.symbol} 当前位于风险优先级首位。`:"当前未识别到高优先级风险资产。")}</div></div></div></div><div class="stack">${panel("引力预警",PRODUCT_COPY.gravity)}<div class="list">${a.map(i=>`<div class="panel"><div class="top"><div><h3>${esc(i.symbol)}</h3><div class="subline">${esc(i.severity)} · ${num(i.gravity_score)}</div></div>${micro("预警")}</div><p>${esc(i.summary)}</p><p>建议动作：${esc(i.action)}</p></div>`).join("")}</div></div></div></div>`;
    };
    renderWatch=function(){
      const list=r().orbit_watchlist||[];
      document.getElementById("scene-watchlist").innerHTML=`<div class="stack">${panel("优先观察轨道",PRODUCT_COPY.watch)}<div class="watchGrid">${list.map(i=>`<div class="panel"><div class="top"><div><h3>${esc(i.symbol)}</h3><div class="subline">${esc(i.orbit_type)} · ${esc(i.priority||"-")} · ${pct(i.change_pct)}</div></div>${micro(`分数 ${num(i.opportunity_score)}`)}</div><p>${esc(i.thesis)}</p><p>关注条件：${esc(i.trigger)}</p><p>失效条件：${esc(i.invalidate)}</p></div>`).join("")}</div></div>`;
    };
    renderFocus=function(){
      const f=r().focus_asset||{};
      document.getElementById("scene-focus").innerHTML=f.symbol?`<div class="stack"><div class="focusGrid"><div class="panel focusHero"><div class="focusCard"><div class="kicker">聚焦资产</div><div class="symbol">${esc(f.symbol)}</div><h3>${esc(f.headline||"-")}</h3><p>${esc(f.summary||"-")}</p><div class="tags">${(f.source_list||[]).map(x=>`<span>${esc(x)}</span>`).join("")}</div><div class="scores">${(f.score_stack||[]).map(s=>`<div class="score"><div class="head"><strong>${esc(s.label)}</strong><span>${num(s.score)}</span></div>${bar(s.score)}</div>`).join("")}</div></div></div><div class="stack"><div class="panel"><h2>触发条件</h2><p>${PRODUCT_COPY.focus}</p><div class="list" style="margin-top:14px">${(f.trigger_stack||[]).map(x=>`<div class="pill" style="border-radius:18px;padding:12px 14px">${esc(x)}</div>`).join("")}</div></div><div class="panel"><h2>失效条件</h2><div class="list" style="margin-top:14px">${(f.invalidation_stack||[]).map(x=>`<div class="pill" style="border-radius:18px;padding:12px 14px">${esc(x)}</div>`).join("")}</div></div><div class="panel"><h2>官方关联</h2><div class="tags" style="margin-top:14px">${(f.official_titles||[]).length?(f.official_titles||[]).map(x=>`<span>${esc(x)}</span>`).join(""):`<span>暂无直接官方关联</span>`}</div></div></div></div></div>`:`<div class="stack">${panel("聚焦资产",PRODUCT_COPY.focus)}<div class="panel"><p>当前没有可展示的聚焦资产。</p></div></div>`;
    };
    renderBroadcast=function(){
      const p=r().broadcast_pack||{};
      document.getElementById("scene-broadcast").innerHTML=`<div class="stack">${panel(p.headline||"内容封装",PRODUCT_COPY.broadcast)}<div class="copyGrid"><div class="copyBox"><div class="top"><h3>X 文案</h3><button class="button alt" data-copy="xCopy" type="button">复制</button></div><textarea id="xCopy" readonly>${text(p.x_post,"")}</textarea></div><div class="copyBox"><div class="top"><h3>广场文案</h3><button class="button alt" data-copy="squareCopy" type="button">复制</button></div><textarea id="squareCopy" readonly>${text(p.square_post,"")}</textarea></div></div><div class="panel"><h3>解读提要</h3><div class="talks" style="margin-top:14px">${(p.talking_points||[]).map(x=>`<div class="pill" style="border-radius:18px;padding:12px 14px">${esc(x)}</div>`).join("")}</div></div></div>`;
    };
    tickClock=function(){};
    normalizeLayout();
    renderAll();
    setInterval(()=>refreshData(true),AUTO_REFRESH_SECONDS*1000);
  </script>
</body>
</html>
